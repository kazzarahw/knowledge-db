# Knowledge-db (kdb) source manifest.
#
# Each source is cloned by `kdb fetch` into data/sources/<name>,
# then chunked and indexed for semantic search by `kdb index`.
#
# Fields:
#   name      : unique slug (also the clone dir name)         [required]
#   type      : git | local | notebooks                        [default: git]
#   url       : git URL (required for git, notebooks)          [conditional]
#   path      : filesystem path (required for type: local)     [conditional]
#   title     : human label shown in the UI                    [optional]
#   category  : grouping shown/filtered in the UI              [optional]
#   branch    : git branch to checkout                         [optional]
#   docs_dir  : subdir within repo to index                    [optional]
#   sparse    : paths for git sparse-checkout (huge repos)     [optional]
#   index_ext : extra file extensions to index                 [optional]
#
# To add your own docs: add a `type: local` entry here pointing at a path,
# or drop markdown into an existing local source directory.

sources:

