# knowledge-db configuration
# Place alongside sources.yaml in your config directory.
# All fields have sensible defaults; uncomment to override.

# ── Git fetch settings ─────────────────────────────────────────────
# fetch:
#   # Max seconds per git subprocess call (clone, pull, checkout, LFS)
#   git_timeout: 300

# ── Index pipeline settings ────────────────────────────────────────
# index:
#   # Base file extensions to index (per-source index_ext adds to this)
#   doc_extensions:
#     - .md
#     - .markdown
#     - .mdx
#     - .rst
#     - .txt
#     - .yml
#     - .yaml
#     - .ipynb

# ── Search defaults ────────────────────────────────────────────────
# search:
#   # Default result count when --top-k is omitted on the CLI
#   default_top_k: 10
